name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches app version
        run: test "$GITHUB_REF_NAME" = "v$(tr -d '[:space:]' < VERSION)"
      - name: Check spectrum analyzer
        run: ./script/test.sh
      - name: Build universal DMG
        run: ./script/package_dmg.sh
      - name: Prepare release files
        run: |
          mv outputs/PulseBar.dmg "outputs/PulseBar-${GITHUB_REF_NAME}.dmg"
          shasum -a 256 "outputs/PulseBar-${GITHUB_REF_NAME}.dmg" > "outputs/PulseBar-${GITHUB_REF_NAME}.dmg.sha256"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "outputs/PulseBar-${GITHUB_REF_NAME}.dmg" \
            "outputs/PulseBar-${GITHUB_REF_NAME}.dmg.sha256" \
            --generate-notes \
            --title "PulseBar ${GITHUB_REF_NAME}"
